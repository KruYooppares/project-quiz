<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับคู่โครงงานคอมพิวเตอร์</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            overflow-y: auto;
            max-height: 90vh;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
            width: 100%;
        }
        
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .question {
            margin-bottom: 25px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .option-btn {
            padding: 8px 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-align: left;
            line-height: 1.3;
        }
        
        .option-btn:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }
        
        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .result-icon {
            text-align: center;
            font-size: 80px;
            margin: 20px 0;
        }
        
        .score-box {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        
        .score-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .score-label {
            color: #666;
            font-size: 14px;
        }
        
        .message {
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-weight: 600;
            text-align: center;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .info-bar {
            background: #f0f4ff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .category-box {
            padding: 12px;
            background: #f0f4ff;
            border: 1px solid #e0e6ff;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Page 1: Form -->
        <div class="page active" id="page1">
            <h1>🎯 เกมจับคู่โครงงานคอมพิวเตอร์</h1>
            <p class="subtitle">จับคู่โครงงาน 5 ข้อกับประเภท 5 ประเภท</p>
            
            <div class="form-group">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="inputName" placeholder="ระบุชื่อ-นามสกุลของคุณ">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>ระดับชั้น</label>
                    <select id="inputGrade">
                        <option>ม.2/1</option>
                        <option>ม.2/2</option>
                        <option>ม.2/3</option>
                        <option>ม.2/4</option>
                        <option>ม.2/5</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>เลขที่</label>
                    <select id="inputNumber">
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button class="button btn-primary" onclick="startQuiz()">🎮 เริ่มทำแบบทดสอบ</button>
                <button class="button btn-secondary" onclick="showStats()">📈 สถิติผู้เข้าสอบ</button>
            </div>
        </div>
        
        <!-- Page 2: Quiz -->
        <div class="page" id="page2">
            <h1>📝 จับคู่โครงงาน</h1>
            
            <div class="info-bar">
                👤 <span id="displayName"></span> | 📚 ชั้น <span id="displayGrade"></span> เลขที่ <span id="displayNumber"></span>
            </div>
            
            <p style="text-align: center; margin-bottom: 20px; font-weight: 600; color: #666;">ประเภทโครงงาน 5 ประเภท:</p>
            
            <div class="category-grid">
                <div class="category-box"><strong>1.</strong> โครงงานพัฒนาซ้อของการศึกษา</div>
                <div class="category-box"><strong>2.</strong> โครงงานพัฒนาเครื่องมือ</div>
                <div class="category-box"><strong>3.</strong> โครงงานจำลองทฤษฎี</div>
                <div class="category-box"><strong>4.</strong> โครงงานประสุขเชิยวงาน</div>
                <div class="category-box"><strong>5.</strong> โครงงานพัฒนาเกม</div>
            </div>
            
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
            
            <div id="questionsContainer"></div>
            
            <div class="button-group">
                <button class="button btn-secondary" onclick="goToPage(1)">← ย้อนกลับ</button>
                <button class="button btn-primary" onclick="submitQuiz()">✓ ส่งคำตอบ</button>
            </div>
        </div>
        
        <!-- Page 3: Results -->
        <div class="page" id="page3">
            <div class="result-icon" id="resultIcon"></div>
            <h1 id="resultTitle" style="text-align: center;"></h1>
            <p id="resultMessage" style="text-align: center; color: #666; margin-bottom: 20px;"></p>
            
            <div class="score-box">
                <div class="score-label">ได้คำตอบถูกต้อง</div>
                <div class="score-number"><span id="correctCount">0</span>/<span id="totalCount">5</span></div>
                <div style="font-size: 36px; font-weight: bold; color: #667eea; margin-top: 10px;"><span id="scorePercent">0</span>%</div>
            </div>
            
            <div id="statusMessage"></div>
            
            <div class="button-group">
                <button class="button btn-secondary" id="btn-retry" onclick="goToPage(2)" style="display: none;">🔄 ทำแบบทดสอบใหม่</button>
                <button class="button btn-primary" id="btn-submit" onclick="sendToGoogleSheets()" style="display: none;">📤 ส่งคะแนน</button>
                <button class="button btn-secondary" onclick="goToPage(1)">🏠 กลับหน้าหลัก</button>
            </div>
        </div>
        
        <!-- Page 4: Statistics -->
        <div class="page" id="page4">
            <h1>📊 สถิติผู้เข้าสอบ</h1>
            <div id="statsContainer" style="margin-top: 20px;"></div>
            <button class="button btn-secondary" onclick="goToPage(1)" style="margin-top: 20px; width: 100%;">← กลับหน้าหลัก</button>
        </div>
        
    </div>

    <script>
        // Configuration
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxG3sFYKygGNCN4gqxQM5JPjVLuASLG_qP6Bmgs0fG4HNgXh48jxrEkBRnvgrjGNUz4/exec';
        
        const QUESTIONS = [
            { question: 'สร้างเกมที่เล่นบนมือถือหรือคอมพิวเตอร์', correctId: 5 },
            { question: 'พัฒนาระบบเพื่อวัดและคำนวณค่าต่างๆ', correctId: 2 },
            { question: 'สร้างโปรแกรมเพื่อใช้ในการเรียนการสอน', correctId: 1 },
            { question: 'จำลองปรากฏการณ์ทางวิทยาศาสตร์หรือฟิสิกส์', correctId: 3 },
            { question: 'พัฒนาเครื่องมือช่วยในการวิเคราะห์ข้อมูล', correctId: 4 }
        ];
        
        const CATEGORIES = [
            'โครงงานพัฒนาซ้อของการศึกษา',
            'โครงงานพัฒนาเครื่องมือ',
            'โครงงานจำลองทฤษฎี',
            'โครงงานประสุขเชิยวงาน',
            'โครงงานพัฒนาเกม'
        ];
        
        // State
        let currentAnswers = {};
        let userData = {};
        let currentScore = 0;
        let stats = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            generateNumberSelect();
            renderQuestions();
        });
        
        function generateNumberSelect() {
            const select = document.getElementById('inputNumber');
            select.innerHTML = '';
            for (let i = 1; i <= 36; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                select.appendChild(option);
            }
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            QUESTIONS.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'question';
                div.innerHTML = `
                    <div class="question-text">${idx + 1}. ${q.question}</div>
                    <div class="options">
                        ${CATEGORIES.map((cat, catIdx) => `
                            <button class="option-btn" onclick="selectAnswer(${idx}, ${catIdx + 1})" id="ans_${idx}_${catIdx + 1}">
                                <strong>${catIdx + 1}.</strong> ${cat}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function selectAnswer(qIdx, catId) {
            currentAnswers[qIdx] = catId;
            renderQuestions();
            updateSelection();
        }
        
        function updateSelection() {
            QUESTIONS.forEach((_, idx) => {
                CATEGORIES.forEach((_, catIdx) => {
                    const btn = document.getElementById(`ans_${idx}_${catIdx + 1}`);
                    if (btn) {
                        if (currentAnswers[idx] === (catIdx + 1)) {
                            btn.classList.add('selected');
                        } else {
                            btn.classList.remove('selected');
                        }
                    }
                });
            });
        }
        
        function startQuiz() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) {
                alert('กรุณากรอกชื่อ-นามสกุล');
                return;
            }
            
            userData = {
                name: name,
                grade: document.getElementById('inputGrade').value,
                number: document.getElementById('inputNumber').value,
                date: new Date().toLocaleDateString('th-TH')
            };
            
            currentAnswers = {};
            document.getElementById('displayName').textContent = name;
            document.getElementById('displayGrade').textContent = userData.grade;
            document.getElementById('displayNumber').textContent = userData.number;
            
            goToPage(2);
        }
        
        function submitQuiz() {
            const correctCount = Object.keys(currentAnswers).filter(idx => 
                currentAnswers[idx] === QUESTIONS[idx].correctId
            ).length;
            
            currentScore = Math.round((correctCount / QUESTIONS.length) * 100);
            
            // Save to local stats
            const record = {
                ...userData,
                score: currentScore,
                correctCount: correctCount
            };
            stats.push(record);
            localStorage.setItem('matchingStats', JSON.stringify(stats));
            
            // Show results
            const passed = currentScore >= 70;
            document.getElementById('resultIcon').textContent = passed ? '🎉' : '💪';
            document.getElementById('resultTitle').textContent = passed ? 'ยินดีด้วย!' : 'ลองใหม่นะ!';
            document.getElementById('resultMessage').textContent = passed ? 'คุณทำได้ดีมาก 👏' : 'คุณเก่งแล้ว เรียนรู้เพิ่มเติมแล้วลองใหม่นะ';
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('totalCount').textContent = QUESTIONS.length;
            document.getElementById('scorePercent').textContent = currentScore;
            
            if (passed) {
                document.getElementById('btn-submit').style.display = 'block';
                document.getElementById('btn-retry').style.display = 'none';
            } else {
                document.getElementById('btn-submit').style.display = 'none';
                document.getElementById('btn-retry').style.display = 'block';
            }
            
            document.getElementById('statusMessage').innerHTML = '';
            goToPage(3);
        }
        
        async function sendToGoogleSheets() {
            const msgDiv = document.getElementById('statusMessage');
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            
            const correctCount = Object.keys(currentAnswers).filter(idx => 
                currentAnswers[idx] === QUESTIONS[idx].correctId
            ).length;
            
            const data = {
                name: userData.name,
                grade: userData.grade,
                number: userData.number,
                score: currentScore,
                correctCount: correctCount,
                totalQuestions: QUESTIONS.length
            };
            
            let retries = 0;
            const maxRetries = 3;
            
            while (retries < maxRetries) {
                try {
                    msgDiv.className = 'message loading';
                    msgDiv.textContent = `📤 ส่งข้อมูล... (ครั้งที่ ${retries + 1}/${maxRetries})`;
                    
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        msgDiv.className = 'message success';
                        msgDiv.textContent = '✅ ส่งข้อมูลสำเร็จ!';
                        setTimeout(() => goToPage(1), 1500);
                        return;
                    }
                } catch (error) {
                    retries++;
                    if (retries < maxRetries) {
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }
            }
            
            msgDiv.className = 'message error';
            msgDiv.textContent = '⚠️ ส่งข้อมูลไม่สำเร็จ โปรดลองอีกครั้ง';
            btn.disabled = false;
        }
        
        function showStats() {
            const container = document.getElementById('statsContainer');
            
            if (stats.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">ยังไม่มีข้อมูลสถิติ</p>';
            } else {
                let html = '<table style="width: 100%; border-collapse: collapse; font-size: 13px;">';
                html += '<tr style="border-bottom: 2px solid #ddd;"><th style="padding: 10px; text-align: left;">ชื่อ</th><th style="padding: 10px;">ชั้น</th><th style="padding: 10px;">เลขที่</th><th style="padding: 10px;">คะแนน</th></tr>';
                
                stats.forEach(s => {
                    const color = s.score >= 70 ? '#28a745' : '#ffc107';
                    html += `<tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 10px;">${s.name}</td>
                        <td style="padding: 10px; text-align: center;">${s.grade}</td>
                        <td style="padding: 10px; text-align: center;">${s.number}</td>
                        <td style="padding: 10px; text-align: center; color: ${color}; font-weight: 600;">${s.score}%</td>
                    </tr>`;
                });
                
                html += '</table>';
                container.innerHTML = html;
            }
            
            goToPage(4);
        }
        
        function loadStats() {
            const saved = localStorage.getItem('matchingStats');
            if (saved) stats = JSON.parse(saved);
        }
        
        function goToPage(pageNum) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page${pageNum}`).classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
